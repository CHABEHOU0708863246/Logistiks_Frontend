<div class="not-found-wrapper">
  <!-- Effet de fond avec grille -->
  <div class="background-grid"></div>

  <!-- Glow d'arrière-plan -->
  <div class="bg-glow"></div>

  <div class="not-found-container">

    <!-- Logo/Back button -->
    <div class="not-found-header">
      <a [routerLink]="['/dashboard']" class="back-home-btn">
        <i class="bx bx-arrow-back"></i>
        <span>Retour à l'accueil</span>
      </a>
    </div>

    <!-- Contenu principal -->
    <div class="not-found-content">

      <!-- Animation 3D avec effet parallax -->
      <div class="scene-wrapper">
        <div class="scene">
          <div class="circle-bg"></div>

          <!-- Éléments flottants décoratifs -->
          <div class="floating-element elem-1">
            <div class="floating-piece"></div>
            <div class="floating-piece"></div>
            <div class="floating-piece"></div>
          </div>

          <div class="floating-element elem-2">
            <div class="floating-piece"></div>
            <div class="floating-piece"></div>
            <div class="floating-piece"></div>
          </div>

          <div class="floating-element elem-3">
            <div class="floating-piece"></div>
            <div class="floating-piece"></div>
            <div class="floating-piece"></div>
          </div>

          <!-- Le nombre 404 -->
          <div class="error-number">404</div>
          <div class="error-number blur">404</div>
        </div>
      </div>

      <!-- Texte d'information -->
      <div class="info-text">
        <h2>Page introuvable</h2>
        <p>
          La page que vous recherchez est actuellement en construction ou n'existe pas.<br>
          Vous pouvez retourner à l'accueil pour continuer à utiliser l'application.
        </p>
        <div class="action-buttons">
          <a [routerLink]="['/dashboard']" class="btn-primary-premium">
            <i class="bx bx-home-alt"></i>
            Tableau de bord
          </a>
          <button class="btn-outline-premium" (click)="goBack()">
            <i class="bx bx-arrow-back"></i>
            Page précédente
          </button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="not-found-footer">
      <span>© 2026 Logistik</span>
      <span class="separator">•</span>
      <a [routerLink]="['/dashboard/about']">Aide & Support</a>
      <span class="separator">•</span>
      <a [routerLink]="['/dashboard/about']">À propos</a>
    </div>
  </div>
</div>
